{% extends 'base.html' %}
{% block content %}
<div style="min-height:100vh; background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%); display:flex; align-items:center; justify-content:center; text-align:center; padding:20px;">
    <div>
        <h1 style="color:white; font-size:48px; font-weight:700; margin-bottom:16px;">

        <p style="color:rgba(255,255,255,0.9); font-size:20px; margin-bottom:8px;">
